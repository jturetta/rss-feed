name: Atualizar feeds RSS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "feeds.json"

permissions:
  contents: write

concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r backend/requirements.txt

      - name: Gerar feeds RSS
        env:
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/update_feeds.py

      - name: Commitar feeds atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualizar feeds RSS"
          file_pattern: "docs/**"
